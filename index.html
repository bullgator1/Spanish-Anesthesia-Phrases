<style>
  :root{ --teal:#0d7c86; --teal-d:#0a5d65; --gold:#e0a800; --bg:#f4f6f7; --card:#ffffff;
         --ink:#1c2526; --muted:#6b7a7c; --line:#dfe5e6; }
  html[data-theme="dark"]{ --bg:#0f1417; --card:#1a2226; --ink:#e7edee; --muted:#93a1a3;
         --line:#2b363b; --teal-d:#46b3bd; }
  html[data-theme="dark"] #search,html[data-theme="dark"] .seg button,
  html[data-theme="dark"] .chip{background:var(--card);color:var(--ink);}
  html[data-theme="dark"] .seg button.on{color:#fff;}
  html[data-theme="dark"] .gt{color:var(--muted);}
  html[data-theme="dark"] .toggle input{background:#3a474c;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;background:var(--bg);
       color:var(--ink);padding-bottom:50px;}
  header{background:var(--teal);color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;
         position:sticky;top:0;z-index:30;}
  header h1{margin:0;font-size:19px;font-weight:700;}
  header p{margin:2px 0 0;font-size:12px;opacity:.85;}
  #theme{position:absolute;top:calc(env(safe-area-inset-top) + 11px);right:14px;border:none;
         background:rgba(255,255,255,.18);color:#fff;width:34px;height:34px;border-radius:50%;
         font-size:18px;line-height:1;cursor:pointer;}
  .controls{position:sticky;top:0;z-index:20;background:var(--bg);padding:10px 12px 6px;
            border-bottom:1px solid var(--line);}
  .crow1{display:flex;gap:8px;align-items:center;}
  #search{flex:1;padding:11px 14px;font-size:16px;border:1px solid var(--line);border-radius:12px;background:#fff;outline:none;}
  #search:focus{border-color:var(--teal);}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;flex:0 0 auto;}
  .seg button{border:none;background:#fff;padding:9px 12px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
  .seg button.on{background:var(--teal);color:#fff;}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:9px 2px 3px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{flex:0 0 auto;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;
        font-size:13px;color:var(--ink);white-space:nowrap;cursor:pointer;}
  .chip.active{background:var(--teal);color:#fff;border-color:var(--teal);}
  .opts{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);padding:2px 2px 4px;}
  .toggle{margin-left:auto;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
  .toggle input{width:38px;height:22px;appearance:none;background:#cdd6d7;border-radius:999px;position:relative;outline:none;cursor:pointer;transition:.2s;}
  .toggle input:checked{background:var(--teal);}
  .toggle input::after{content:"";position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s;}
  .toggle input:checked::after{left:18px;}
  main{padding:6px 12px 0;max-width:760px;margin:0 auto;}
  .section{margin-top:16px;}
  .section h2{font-size:14px;text-transform:uppercase;letter-spacing:.04em;
              margin:0 2px 8px;display:flex;align-items:center;gap:8px;}
  .card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--teal);
        border-radius:12px;padding:11px 12px;margin-bottom:9px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:transform .05s;}
  .card:active{transform:scale(.99);}
  .tag{flex:0 0 auto;font-size:18px;width:22px;text-align:center;}
  .card .txt{flex:1;min-width:0;}
  .card .es{font-size:18px;font-weight:600;color:var(--ink);line-height:1.25;}
  .card .en{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.2;}
  .star{flex:0 0 auto;width:34px;height:34px;border:none;background:transparent;font-size:20px;color:#c7ccce;cursor:pointer;line-height:1;}
  .star.on{color:var(--gold);}
  .gt{flex:0 0 auto;font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:4px 6px;border-radius:7px;}
  .speak{flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:none;background:var(--teal);
         color:#fff;font-size:19px;display:grid;place-items:center;cursor:pointer;}
  .speak:active{filter:brightness(.9);}
  .speak.playing{background:var(--gold) !important;}
  .hidden{display:none !important;}
  .emptyhint{color:var(--muted);font-size:13px;padding:4px 4px 10px;}
  details.consent{background:#fff;border:1px solid var(--line);border-radius:14px;margin:14px 12px;padding:4px 14px;max-width:760px;margin-left:auto;margin-right:auto;}
  details.consent>summary{font-weight:600;padding:10px 0;cursor:pointer;color:var(--teal-d);}
  .ctype{border-top:1px solid var(--line);padding:10px 0;}
  .ctype h3{margin:0 0 6px;font-size:15px;}
  .crow{display:flex;gap:10px;align-items:flex-start;margin:7px 0;}
  .crow .clab{font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;flex:0 0 60px;padding-top:2px;}
  .crow .cbody{flex:1;font-size:13px;line-height:1.4;}
  .crow .cbody .ces{color:var(--muted);margin-top:3px;}
  .mini{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:none;background:var(--teal);color:#fff;font-size:14px;cursor:pointer;}
  footer{max-width:760px;margin:18px auto 0;padding:0 14px;color:var(--muted);font-size:12px;line-height:1.5;}
  footer a{color:var(--teal);}
  .voicewarn{background:#fff3e0;border:1px solid #ffd9a0;color:#8a5a00;font-size:12px;padding:8px 12px;border-radius:10px;margin:8px 0;}
</style>
</head>

<script>
const SECTIONS = [{"name": "Greeting & history", "icon": "🤝", "color": "#0d7c86", "items": [["Hello, I'm the anesthesiologist.", "Hola, soy el anestesiólogo.", "Hola, soy el anestesiólogo.", 1], ["What is your name?", "¿Cómo se llama?", "¿Cómo te llamas?"], ["How are you feeling?", "¿Cómo se siente?", "¿Cómo te sientes?"], ["Don't be nervous, I'll take care of you.", "No esté nervioso, yo lo voy a cuidar.", "No estés nervioso, yo te voy a cuidar.", 1], ["When did you last eat or drink?", "¿Cuándo fue la última vez que comió o bebió?", "¿Cuándo fue la última vez que comiste o bebiste?"], ["Do you have any allergies?", "¿Tiene alguna alergia?", "¿Tienes alguna alergia?", 1], ["Do you have loose teeth or dentures?", "¿Tiene dientes flojos o dentadura postiza?", "¿Tienes dientes flojos o dentadura postiza?"], ["Have you had anesthesia before?", "¿Le han dado anestesia antes?", "¿Te han dado anestesia antes?"], ["Do you have any questions?", "¿Tiene alguna pregunta?", "¿Tienes alguna pregunta?"]]}, {"name": "Pre-op & IV", "icon": "💉", "color": "#2980b9", "items": [["You'll wait here; we'll take you to the OR when ready.", "Esperará aquí; lo llevaremos al quirófano cuando esté listo.", "Esperarás aquí; te llevaremos al quirófano cuando estés listo."], ["I'm placing an IV in your hand or arm. It may hurt a little.", "Le voy a colocar un catéter intravenoso en la mano o el brazo. Puede doler un poco.", "Te voy a colocar un catéter intravenoso en la mano o el brazo. Puede doler un poco.", 1], ["I'm putting a tourniquet on your arm to see the veins better.", "Le pongo un torniquete en el brazo para ver mejor las venas.", "Te pongo un torniquete en el brazo para ver mejor las venas."], ["Make a fist to make your veins bigger.", "Cierre el puño para agrandar las venas.", "Cierra el puño para agrandar las venas."], ["A small pinch and a burn.", "Un pequeño piquete y un ardor.", "Un pequeño piquete y un ardor."], ["The operating room is cold and has bright lights.", "El quirófano es frío y tiene luces brillantes.", "El quirófano es frío y tiene luces brillantes."]]}, {"name": "Positioning & before induction", "icon": "🛏️", "color": "#8e44ad", "items": [["We'll help you take off your gown.", "Le ayudaremos a quitarse la bata.", "Te ayudaremos a quitarte la bata."], ["Slide over to the operating table.", "Pásese a la mesa de operaciones.", "Pásate a la mesa de operaciones."], ["Move up in bed, toward the head.", "Súbase en la cama, hacia la cabecera.", "Súbete en la cama, hacia la cabecera.", 1], ["Move down a little.", "Bájese un poco.", "Bájate un poco."], ["Lie on your back.", "Acuéstese boca arriba.", "Acuéstate boca arriba."], ["Turn on your side.", "Acuéstese de lado.", "Acuéstate de lado."], ["We're placing the monitors.", "Estamos colocando los monitores.", "Estamos colocando los monitores."], ["This mask gives you oxygen. Lift your chin.", "Esta mascarilla le da oxígeno. Levante la barbilla.", "Esta mascarilla te da oxígeno. Levanta la barbilla.", 1], ["Relax your shoulders.", "Relaje los hombros.", "Relaja los hombros."], ["Don't move.", "No se mueva.", "No te muevas.", 1], ["Hold still.", "Quédese quieto.", "Quédate quieto."]]}, {"name": "Induction & emergence", "icon": "😴", "color": "#6c5ce7", "items": [["You're going to feel sleepy.", "Va a sentir sueño.", "Vas a sentir sueño."], ["You're going to sleep now.", "Ahora se va a dormir.", "Ahora te vas a dormir."], ["Open your eyes.", "Abra los ojos.", "Abre los ojos.", 1], ["Squeeze my hand.", "Apriete mi mano.", "Aprieta mi mano.", 1], ["Take a deep breath.", "Respire profundo.", "Respira profundo.", 1], ["Breathe slow and deep.", "Respire despacio y profundo.", "Respira despacio y profundo."], ["Breathe through the mask.", "Respire por la mascarilla.", "Respira por la mascarilla.", 1], ["The surgery is over.", "La cirugía terminó.", "La cirugía terminó.", 1], ["You're waking up.", "Se está despertando.", "Te estás despertando."], ["Everything went well.", "Todo salió bien.", "Todo salió bien."]]}, {"name": "Recovery / PACU", "icon": "🩹", "color": "#27ae60", "items": [["You are in the recovery area.", "Está en el área de recuperación.", "Estás en el área de recuperación."], ["We'll watch your vital signs.", "Vamos a vigilar sus signos vitales.", "Vamos a vigilar tus signos vitales."], ["Are you in pain?", "¿Tiene dolor?", "¿Tienes dolor?", 1], ["Where does it hurt?", "¿Dónde le duele?", "¿Dónde te duele?", 1], ["From 0 to 10, how bad is the pain?", "Del 0 al 10, ¿qué tan fuerte es el dolor?", "Del 0 al 10, ¿qué tan fuerte es el dolor?"], ["I'll give you medicine for the pain.", "Le voy a dar medicina para el dolor.", "Te voy a dar medicina para el dolor.", 1], ["Do you feel nauseous or like vomiting?", "¿Tiene náuseas o ganas de vomitar?", "¿Tienes náuseas o ganas de vomitar?"], ["Are you cold?", "¿Tiene frío?", "¿Tienes frío?"], ["Take a deep breath and cough.", "Respire profundo y tosa.", "Respira profundo y tose."], ["Wiggle your toes.", "Mueva los dedos de los pies.", "Mueve los dedos de los pies."], ["Can you feel this?", "¿Siente esto?", "¿Sientes esto?"], ["You're ready to go home.", "Está listo para irse a casa.", "Estás listo para irte a casa."], ["We'll remove the IV.", "Le quitaremos el catéter intravenoso.", "Te quitaremos el catéter intravenoso."]]}, {"name": "Pain & reassurance", "icon": "💬", "color": "#e67e22", "items": [["Don't worry.", "No se preocupe.", "No te preocupes.", 1], ["You're doing great.", "Lo está haciendo muy bien.", "Lo estás haciendo muy bien.", 1], ["I'm right here with you.", "Aquí estoy con usted.", "Aquí estoy contigo.", 1], ["It's almost over.", "Ya casi terminamos.", "Ya casi terminamos."], ["You're safe.", "Está seguro.", "Estás seguro."], ["Try to relax.", "Trate de relajarse.", "Trata de relajarte."]]}, {"name": "Labor & delivery", "icon": "👶", "color": "#d6336c", "items": [["Round your back like a shrimp. Relax your shoulders.", "Doble la espalda como un camarón. Relaje los hombros.", "Dobla la espalda como un camarón. Relaja los hombros.", 1], ["Do you have a headache?", "¿Le duele la cabeza?", "¿Te duele la cabeza?"], ["Do you have numbness, tingling, or weakness in your legs?", "¿Tiene adormecimiento, hormigueo o debilidad en las piernas?", "¿Tienes adormecimiento, hormigueo o debilidad en las piernas?"], ["Have you walked and used the bathroom?", "¿Ha caminado y usado el baño?", "¿Has caminado y usado el baño?"], ["Do you have pain, swelling, or discomfort in your back?", "¿Tiene dolor, hinchazón o molestia en la espalda?", "¿Tienes dolor, hinchazón o molestia en la espalda?"], ["We're going to place an epidural for the pain.", "Le vamos a colocar una epidural para el dolor.", "Te vamos a colocar una epidural para el dolor."], ["Stay still during the contraction.", "Quédese quieta durante la contracción.", "Quédate quieta durante la contracción."], ["Tell me if you feel the medicine working.", "Dígame si siente que la medicina hace efecto.", "Dime si sientes que la medicina hace efecto."]]}];
const CONSENT  = [{"type": "General Anesthesia (GA)", "risks_en": "Swelling; irritation; injury to teeth, lip, gum, tongue, throat, voice box; difficulty placing the breathing tube; low blood oxygen; laryngospasm; bronchospasm; low/high blood pressure; slow/fast/irregular heartbeat; heart attack; allergic reaction; aspiration; pneumonia; prolonged intubation; dry mouth; nausea; vomiting; sore throat; hoarseness; difficulty breathing; sleepiness; headache; dizziness; confusion; impaired vision; shivering; stroke; possible awareness; cardiac arrest; death.", "risks_es": "Hinchazón; irritación; lesión en dientes, labios, encías, lengua, garganta o laringe; dificultad para colocar el tubo de respiración; bajo nivel de oxígeno; laringoespasmo; broncoespasmo; presión arterial baja o alta; latidos lentos, rápidos o irregulares; ataque cardíaco; reacción alérgica; aspiración; neumonía; intubación prolongada; boca seca; náuseas; vómitos; dolor de garganta; ronquera; dificultad para respirar; somnolencia; dolor de cabeza; mareos; confusión; visión borrosa; escalofríos; derrame cerebral; posible conciencia del procedimiento; paro cardíaco; muerte.", "ben_en": "Amnesia, pain relief, ability to tolerate the procedure, lack of awareness, lack of anxiety.", "ben_es": "Amnesia, alivio del dolor, capacidad para tolerar el procedimiento, falta de conciencia, falta de ansiedad.", "alt_en": "Regional anesthesia, MAC, or none.", "alt_es": "Anestesia regional, MAC o ninguna."}, {"type": "Regional (nerve block, epidural, spinal)", "risks_en": "Infection, bleeding, or swelling at the injection site; nerve damage; tingling; numbness; muscle weakness; failed injection requiring general anesthesia; allergic reaction; high spinal; headache; irregular heartbeat; low blood pressure; slow/fast heartbeat; seizures; cardiac arrest; death.", "risks_es": "Infección, sangrado o hinchazón en el lugar de la inyección; daño a los nervios; hormigueo; entumecimiento; debilidad muscular; inyección fallida que requiere anestesia general; reacción alérgica; bloqueo espinal alto; dolor de cabeza; latidos irregulares; presión arterial baja; latidos lentos o rápidos; convulsiones; paro cardíaco; muerte.", "ben_en": "Ability to breathe on your own, prolonged post-op pain control, rapid recovery.", "ben_es": "Capacidad para respirar por sí solo, control prolongado del dolor postoperatorio, recuperación rápida.", "alt_en": "General anesthesia, MAC.", "alt_es": "Anestesia general, MAC."}, {"type": "Monitored Anesthesia Care (MAC)", "risks_en": "Nausea; vomiting; allergic reaction; headache; discomfort at the surgical site; possible awareness; slow/fast heartbeat; low/high blood pressure; irregular heartbeat; cardiac arrest; death; failed MAC requiring general anesthesia.", "risks_es": "Náuseas; vómitos; reacción alérgica; dolor de cabeza; malestar en el sitio quirúrgico; posible conciencia; latidos lentos o rápidos; presión arterial baja o alta; latidos irregulares; paro cardíaco; muerte; MAC fallido que requiere anestesia general.", "ben_en": "Faster recovery, less anxiety, ability to breathe on your own.", "ben_es": "Recuperación más rápida, menos ansiedad, capacidad para respirar por sí solo.", "alt_en": "General anesthesia, regional.", "alt_es": "Anestesia general, regional."}];
document.getElementById('disc').textContent = "This translation eCard was created by physicians to help Spanish-speaking patients feel more comfortable while receiving care. It should not be used in place of medical interpreter services and is not a legal or formal medical document. It is an informal tool to aid communication when an interpreter is not present. Any responses warranting follow-up should be discussed with a medical interpreter.";

/* ---- storage (guarded) ---- */
const store={get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}},
             set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
let reg = store.get('reg','formal');           // 'formal' | 'informal'
let favs = store.get('favs',[]);               // array of English keys
const esOf = it => reg==='informal' ? it[2] : it[1];

/* ---- flat list w/ section ref ---- */
const ALL=[];
SECTIONS.forEach((sec,si)=>sec.items.forEach(it=>ALL.push({en:it[0],f:it[1],t:it[2],common:!!it[3],sec,si})));

/* ---- speech ---- */
let esVoice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  esVoice=vs.find(v=>/es-US/i.test(v.lang))||vs.find(v=>/es-MX/i.test(v.lang))||vs.find(v=>/es-ES/i.test(v.lang))||vs.find(v=>/^es/i.test(v.lang))||null;}
if('speechSynthesis' in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
let curBtn=null;
function speak(text,btn){ if(!('speechSynthesis' in window))return;
  speechSynthesis.cancel(); if(curBtn){curBtn.classList.remove('playing');curBtn.textContent='🔊';}
  const u=new SpeechSynthesisUtterance(text); u.lang=esVoice?esVoice.lang:'es-US'; if(esVoice)u.voice=esVoice;
  u.rate=document.getElementById('slow').checked?0.7:0.95;
  if(btn){btn.classList.add('playing');btn.textContent='⏸';curBtn=btn;
    u.onend=()=>{btn.classList.remove('playing');btn.textContent='🔊';}; u.onerror=u.onend;}
  speechSynthesis.speak(u);}
const gtLink=es=>'https://translate.google.com/?sl=es&tl=en&op=translate&text='+encodeURIComponent(es);

/* ---- card factory ---- */
function makeCard(o){
  const es=esOf([o.en,o.f,o.t]);
  const card=document.createElement('div'); card.className='card';
  card.style.borderLeftColor=o.sec.color;
  card.dataset.en=o.en;
  card.dataset.search=(o.en+' '+o.f+' '+o.t).toLowerCase();
  card.innerHTML=
    '<span class="tag">'+o.sec.icon+'</span>'+
    '<div class="txt"><div class="es"></div><div class="en"></div></div>'+
    '<button class="star" aria-label="Favorite">☆</button>'+
    '<a class="gt" target="_blank" rel="noopener" title="Google Translate">GT</a>'+
    '<button class="speak" aria-label="Speak">🔊</button>';
  card.querySelector('.es').textContent=es;
  card.querySelector('.en').textContent=o.en;
  card.querySelector('.gt').href=gtLink(es);
  const sb=card.querySelector('.speak'); sb.style.background=o.sec.color;
  const star=card.querySelector('.star');
  if(favs.includes(o.en)){star.classList.add('on');star.textContent='★';}
  card.addEventListener('click',e=>{ if(e.target.closest('.gt')||e.target.closest('.star'))return; speak(esOf([o.en,o.f,o.t]),sb);});
  star.addEventListener('click',e=>{e.stopPropagation();toggleFav(o.en);});
  return card;
}

/* ---- render ---- */
const main=document.getElementById('main');
function sectionEl(id,icon,title,color){
  const s=document.createElement('section'); s.className='section'; s.dataset.sec=id;
  s.innerHTML='<h2 style="color:'+color+'"><span>'+icon+'</span>'+title+'</h2>';
  return s;
}
let favSection;
function buildAll(){
  main.innerHTML='';
  // Favorites
  favSection=sectionEl('fav','⭐','Favorites','#caa000');
  renderFav(favSection);
  main.appendChild(favSection);
  // Common
  const cs=sectionEl('common','🔥','Common','#caa000');
  ALL.filter(o=>o.common).forEach(o=>cs.appendChild(makeCard(o)));
  main.appendChild(cs);
  // Phases
  SECTIONS.forEach((sec,si)=>{
    const s=sectionEl(si,sec.icon,sec.name,sec.color);
    sec.items.forEach(it=>s.appendChild(makeCard({en:it[0],f:it[1],t:it[2],common:!!it[3],sec,si})));
    main.appendChild(s);
  });
  applyFilter();
}
function renderFav(sec){
  [...sec.querySelectorAll('.card,.emptyhint')].forEach(n=>n.remove());
  const items=ALL.filter(o=>favs.includes(o.en));
  if(!items.length){const h=document.createElement('div');h.className='emptyhint';h.textContent='Tap ☆ on any phrase to pin it here.';sec.appendChild(h);}
  items.forEach(o=>sec.appendChild(makeCard(o)));
}

/* ---- favorites ---- */
function toggleFav(en){
  if(favs.includes(en)) favs=favs.filter(x=>x!==en); else favs=[...favs,en];
  store.set('favs',favs);
  document.querySelectorAll('.card').forEach(c=>{
    const on=favs.includes(c.dataset.en); const s=c.querySelector('.star');
    s.classList.toggle('on',on); s.textContent=on?'★':'☆';});
  renderFav(favSection); applyFilter();
}

/* ---- register toggle ---- */
document.getElementById('reg').addEventListener('click',e=>{
  const btn=e.target.closest('button'); if(!btn)return;
  reg=btn.dataset.r; store.set('reg',reg);
  document.querySelectorAll('#reg button').forEach(b=>b.classList.toggle('on',b===btn));
  document.querySelectorAll('.card').forEach(c=>{
    const o=ALL.find(x=>x.en===c.dataset.en); if(!o)return;
    const es=esOf([o.en,o.f,o.t]);
    c.querySelector('.es').textContent=es; c.querySelector('.gt').href=gtLink(es);});
});
function initReg(){document.querySelectorAll('#reg button').forEach(b=>b.classList.toggle('on',b.dataset.r===reg));}

/* ---- chips / filter ---- */
const chips=document.getElementById('chips'); let activeSec='all';
function addChip(label,sec){const c=document.createElement('div');c.className='chip'+(sec==='all'?' active':'');
  c.textContent=label;c.dataset.sec=sec;c.onclick=()=>{activeSec=sec;document.getElementById('search').value='';
    [...chips.children].forEach(x=>x.classList.toggle('active',x===c));applyFilter();};chips.appendChild(c);}
addChip('All','all'); addChip('⭐ Favorites','fav'); addChip('🔥 Common','common');
SECTIONS.forEach((s,i)=>addChip(s.icon+' '+s.name.split(' ')[0],i));

const search=document.getElementById('search');
search.addEventListener('input',()=>{ if(search.value.trim()){activeSec='all';
  [...chips.children].forEach(x=>x.classList.toggle('active',x.dataset.sec==='all'));} applyFilter();});

function applyFilter(){
  const q=search.value.trim().toLowerCase();
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('hidden', q && !c.dataset.search.includes(q)));
  document.querySelectorAll('.section').forEach(s=>{
    const id=s.dataset.sec;
    let show = activeSec==='all' ? true : id===activeSec;
    if(q) show = id!=='fav' && id!=='common';      // while searching, show phases only (avoid dupes)
    if(show && q){ show=[...s.querySelectorAll('.card')].some(c=>!c.classList.contains('hidden')); }
    if(show && !q && id==='fav' && !favs.length && activeSec!=='fav') show=false;
    s.classList.toggle('hidden',!show);
  });
  const n=document.querySelectorAll('.section:not(.hidden) .card:not(.hidden)').length;
  document.getElementById('count').textContent=n+' phrase'+(n===1?'':'s');
}

/* ---- consent ---- */
const cdiv=document.getElementById('consent');
CONSENT.forEach(c=>{const d=document.createElement('div');d.className='ctype';d.innerHTML='<h3>'+c.type+'</h3>';
  [['Risks',c.risks_en,c.risks_es],['Benefits',c.ben_en,c.ben_es],['Alternatives',c.alt_en,c.alt_es]].forEach(([lab,en,es])=>{
    const r=document.createElement('div');r.className='crow';
    r.innerHTML='<div class="clab">'+lab+'</div><div class="cbody">'+en+'<div class="ces"></div></div><button class="mini">🔊</button>';
    r.querySelector('.ces').textContent=es; r.querySelector('.mini').addEventListener('click',ev=>{ev.stopPropagation();speak(es,null);});
    d.appendChild(r);});cdiv.appendChild(d);});

/* ---- theme ---- */
const mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
let theme=store.get('theme',(mq&&mq.matches)?'dark':'light');
function applyTheme(){document.documentElement.dataset.theme=theme;
  const m=document.querySelector('meta[name=theme-color]'); if(m)m.setAttribute('content',theme==='dark'?'#0f1417':'#0d7c86');
  document.getElementById('theme').textContent=theme==='dark'?'◑':'◐';}
document.getElementById('theme').addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';store.set('theme',theme);applyTheme();});

/* ---- init ---- */
applyTheme(); initReg(); buildAll();
setTimeout(()=>{ if(!('speechSynthesis' in window)){const w=document.createElement('div');w.className='voicewarn';
  w.textContent='This browser has no speech synthesis — use the GT button to hear phrases on Google Translate.';main.prepend(w);}},800);
</script>
</body>
</html>
